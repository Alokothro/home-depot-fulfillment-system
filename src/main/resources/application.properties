# Server Configuration
server.port=8080
spring.application.name=order-fulfillment-system

# Database Configuration - H2 (Development/Testing)
spring.datasource.url=jdbc:h2:mem:fulfillment_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database Configuration - MySQL (Production)
# Uncomment these for MySQL and comment H2 configuration above
#spring.datasource.url=jdbc:mysql://localhost:3306/fulfillment_db?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=your_password
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database Configuration - PostgreSQL (Production)
# Uncomment these for PostgreSQL and comment H2 configuration above
#spring.datasource.url=jdbc:postgresql://localhost:5432/fulfillment_db
#spring.datasource.username=postgres
#spring.datasource.password=your_password
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL: org.hibernate.dialect.MySQLDialect
# For PostgreSQL: org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
logging.level.root=INFO
logging.level.com.homedepot.fulfillment=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Initialize database with sample data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Business Rules Configuration
fulfillment.tax.rate=0.07
fulfillment.shipping.free-threshold=50.00
fulfillment.shipping.standard-cost=5.00
